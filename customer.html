<!DOCTYPE html>
<html>
<head>
    <title>Women's Skill Hub - Create Account</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9ecf, #ffc0cb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .account-box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #ff4da6;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #ff4da6;
            color: white;
            border: none;
            padding: 10px;
            width: 95%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #e60073;
        }

        .login-link {
            margin-top: 10px;
            font-size: 14px;
        }

        .login-link a {
            color: #ff4da6;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="account-box">
        <h2>Create Account 💗</h2>

        <form>
            <input type="text" placeholder="Full Name" required><br>
            <input type="email" placeholder="Email Address" required><br>
            <input type="tel" placeholder="Phone Number" required><br>
            <input type="password" placeholder="Create Password" required><br>
            <button type="submit">Sign Up</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="#">Login</a>
        </div>
    </div>

</body>
</html>
