<!DOCTYPE html>
<html>
<head>
    <title>Empowered Women Marketplace</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #ffe6f0, #fff5e6);
            text-align: center;
        }
        header {
            background-color: #ff6699;
            color: white;
            padding: 20px;
        }
        .section {
            margin: 30px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 20px;
            background-color: #ff3366;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #cc0052;
        }
    </style>
</head>
<body>

<header>
    <h1>🌸 Empowered Women Marketplace</h1>
    <p>Sell Your Skills from Home</p>
</header>

<div class="section">
    <h2>🍲 Homemade Cooking</h2>
    <p>Upload and sell your homemade dishes</p>
    <button>Explore</button>
</div>

<div class="section">
    <h2>🧵 Tailoring Services</h2>
    <p>Custom stitching & dress designing</p>
    <button>Explore</button>
</div>

<div class="section">
    <h2>🎨 Handmade Crafts</h2>
    <p>Showcase your creative handmade products</p>
    <button>Explore</button>
</div>

<div class="section">
    <h2>🧁 Baking & Snacks</h2>
    <p>Sell cakes, sweets & homemade snacks</p>
    <button>Explore</button>
</div>

</body>
</html>
